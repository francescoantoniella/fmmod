# ─────────────────────────────────────────────
# /etc/hostapd/hostapd.conf
# Access Point WiFi per FM Processor
# ─────────────────────────────────────────────

interface=wlan0
driver=nl80211

# Nome rete (SSID) — cambia a piacere
ssid=FM-PROCESSOR

# Canale WiFi (1-13, scegli uno lontano da interferenze locali)
channel=6

# Modalità: g=2.4GHz (compatibile con tutti), a=5GHz (meno interferenze)
hw_mode=g

# Sicurezza WPA2
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# Password WiFi — CAMBIA QUESTA
wpa_passphrase=fmprocessor2024

# Nascondi SSID (0=visibile, 1=nascosto)
ignore_broadcast_ssid=0

# Parametri stabilità
wmm_enabled=0
macaddr_acl=0
