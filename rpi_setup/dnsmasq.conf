# ─────────────────────────────────────────────
# /etc/dnsmasq.conf
# DHCP + DNS per la rete FM-PROCESSOR
# ─────────────────────────────────────────────

# Interfaccia su cui girare
interface=wlan0

# Non usare /etc/resolv.conf (siamo offline)
no-resolv

# Range DHCP: assegna IP da .10 a .50, lease 24h
dhcp-range=192.168.73.10,192.168.73.50,24h

# IP statico per il Raspberry (gateway)
dhcp-option=3,192.168.73.1

# DNS: rimanda tutto a noi stessi (captive portal style)
# Qualsiasi dominio → apre l'interfaccia FM
address=/#/192.168.73.1

# Nome host locale per accesso comodo
# http://fmproc.local → stesso risultato di http://192.168.73.1:8080
address=/fmproc.local/192.168.73.1
address=/fmproc/192.168.73.1
